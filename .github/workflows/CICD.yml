# this is the name of the workflow that will be displayed in the Actions Tab
name: CICD

# Manual Click (deliver) workflow whenever user needs
on:
  workflow_dispatch: 
    inputs:
      environments:
        description: This is the environment value where this workflow runs
        default: 'dev' 
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
  # every job needs a runner, it is called parallelism
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "Code clone from Github"
        
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker Container
        run: echo "Docker Container build"

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the Container
        run: echo "Testing the Container"

  deploy:
    if: inputs.environments == 'dev'
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
